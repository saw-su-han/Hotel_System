version: '3.9'

services:
  db:
    image: postgres:16
    container_name: hotel_system
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prisma

    ports:
      - '5003:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
